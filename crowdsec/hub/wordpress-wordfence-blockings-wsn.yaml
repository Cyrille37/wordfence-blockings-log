# cyrille37/wordpress-wordfence-blockings-wsn
# Version: 2026-06-14
#
# @see wordpress-wordfence-blockings-wsn.md
#
# Trigger on lines :
# [block] [Blocked by Wordfence Security Network]
#
format: 2.0
name: cyrille37/wordpress-wordfence-blockings-wsn
description: "Propagate Blocked by Wordfence Security Network to Crowdsec"
type: trigger
debug: true
filter: "evt.Meta.program == 'wordfence-blockings-log' && evt.Parsed.event_type == 'block' && evt.Parsed.message == 'Blocked by Wordfence Security Network'"
groupby: "evt.Meta.source_ip"
blackhole: 60m
labels:
  service: wordfence-blockings-log
  spoofable: 0
  confidence: 3
  type: discovery
  label: "Http Scan"
  behaviors: ['http:scan']
  remediation: true
