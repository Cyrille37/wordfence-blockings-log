# cyrille37/wordpress-wordfence-blockings-scan
# Version: 2026-06-14
#
# @see wordpress-wordfence-blockings-scan.md
#
# Doc: https://docs.crowdsec.net/docs/log_processor/scenarios/format/
#
# Trigger on lines :
# [block] [Exceeded the maximum global requests per minute for crawlers or humans.]
# [block] [Exceeded the maximum number of page not found errors per minute for humans.]
# [block] [Exceeded the maximum number of page not found errors per minute for a crawler.]
#
format: 2.0
name: cyrille37/wordpress-wordfence-blockings-scan
description: "Trigger on exceeded the maximum requests per minutes"
type: trigger
#debug: true
filter: "evt.Meta.program == 'wordfence-blockings-log' && evt.Parsed.event_type == 'block' && hasPrefix(evt.Parsed.message,'Exceeded the maximum ')"
groupby: "evt.Meta.source_ip"
blackhole: 15m
labels:
  service: http
  spoofable: 0
  confidence: 3
  label: 'Wordfence Http Scan'
  behavior: 'http:crawl'
  remediation: true
